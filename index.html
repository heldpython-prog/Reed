<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>RedKnowledge · Mobile Fixed</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0b0b0f; color: #f0e6d2; display: flex; height: 100vh; overflow: hidden; }
    :root { --accent: #e6b800; --accent-light: #ffd633; --border-dim: rgba(230,184,0,0.2); --sidebar-bg: #0e0e12; --bubble-user: #1e1e24; --bubble-assistant: #16161c; }

    /* Hamburger menu */
    .mobile-menu-btn {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 101;
      background: rgba(20, 20, 28, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-dim);
      color: var(--accent);
      width: 48px;
      height: 48px;
      border-radius: 16px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
    .mobile-menu-btn i { font-size: 1.6rem; }

    @media (max-width: 700px) {
      .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; z-index: 100; transition: left 0.3s; width: 280px; box-shadow: 5px 0 25px rgba(0,0,0,0.5); }
      .sidebar.open { left: 0; }
      .mobile-menu-btn { display: flex; }
      .main { width: 100%; }
      .chat-messages { padding: 0.75rem !important; }
      .message { max-width: 95% !important; }
      .chat-header { padding: 0.75rem 1rem !important; }
      .chat-input-container { padding: 0.75rem 1rem 1rem !important; }
      .input-wrapper { padding: 0.25rem 0.25rem 0.25rem 1rem !important; border-radius: 36px !important; }
      .input-wrapper input { padding: 0.7rem 0 !important; font-size: 16px !important; } /* prevent zoom */
      .input-actions { gap: 2px !important; }
      .model-select-sm { padding: 6px 8px !important; font-size: 0.7rem !important; }
      .attach-btn { padding: 8px !important; }
      .send-btn, .stop-btn { width: 44px !important; height: 44px !important; }
    }

    .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border-dim); display: flex; flex-direction: column; height: 100vh; backdrop-filter: blur(12px); }
    .logo-area { display: flex; align-items: center; gap: 10px; padding: 1.8rem 1.2rem; border-bottom: 1px solid var(--border-dim); }
    .star-svg { width: 32px; height: 32px; color: var(--accent); filter: drop-shadow(0 0 10px #e6b80080); }
    .logo-text { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, #fff0c0, var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .new-chat-btn { margin: 1.2rem; background: rgba(230,184,0,0.08); border: 1px solid var(--border-dim); color: #f0e6d2; padding: 0.9rem; border-radius: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s; font-weight: 500; backdrop-filter: blur(4px); }
    .new-chat-btn:hover { background: rgba(230,184,0,0.18); border-color: var(--accent); }
    .conversation-list { flex: 1; overflow-y: auto; padding: 0 0.8rem; }
    .conv-item { padding: 0.9rem 1rem; border-radius: 12px; margin-bottom: 6px; color: #c0b8a8; cursor: pointer; font-size: 0.95rem; display: flex; align-items: center; justify-content: space-between; }
    .conv-item:hover { background: #22222a; }
    .conv-item.active { background: #2a2a35; color: white; border-left: 4px solid var(--accent); }
    .conv-item i { opacity: 0.5; padding: 4px; }
    .sidebar-footer { padding: 1.2rem 1rem; border-top: 1px solid var(--border-dim); font-size: 0.8rem; color: #888; text-align: center; }

    .main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at 10% 20%, #1a1a22 0%, #0b0b0f 100%); }
    .chat-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-dim); display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(8px); background: rgba(11,11,15,0.5); }
    .chat-header h2 { font-weight: 500; font-size: 1.2rem; }
    .prompt-badge { background: #1e1e24; padding: 4px 12px; border-radius: 30px; border: 1px solid var(--border-dim); color: var(--accent); font-size: 0.8rem; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem 1.5rem 0.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .message { display: flex; gap: 12px; max-width: 85%; animation: fadeSlide 0.2s; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message-avatar { width: 34px; height: 34px; border-radius: 10px; background: #1e1e24; display: flex; align-items: center; justify-content: center; color: var(--accent); flex-shrink: 0; border: 1px solid var(--border-dim); }
    .message.user .message-avatar { background: linear-gradient(145deg, #2a2a00, #1a1a00); }
    .message-content { background: var(--bubble-assistant); padding: 1rem 1.5rem; border-radius: 20px; border-top-left-radius: 6px; color: #e0d6c0; border: 1px solid var(--border-dim); line-height: 1.5; font-size: 0.95rem; word-break: break-word; backdrop-filter: blur(8px); }
    .message.user .message-content { background: var(--bubble-user); border-radius: 20px; border-top-right-radius: 6px; }

    .status-badge { display: flex; align-items: center; gap: 10px; padding: 8px 18px; background: #1a1a00; border-radius: 30px; width: fit-content; margin-bottom: 12px; border: 1px solid var(--accent); color: var(--accent); }
    .typing-indicator { display: flex; gap: 6px; padding: 0.8rem 1.5rem; background: var(--bubble-assistant); border-radius: 20px; width: fit-content; border: 1px solid var(--border-dim); }
    .typing-indicator span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite; }
    @keyframes bounce { 0%,80%,100%{ transform:scale(0.7); opacity:0.4; } 40%{ transform:scale(1); opacity:1; } }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .chat-input-container { padding: 1rem 1.5rem 1.5rem; background: transparent; }
    .input-wrapper { display: flex; align-items: center; background: rgba(20,20,28,0.9); border: 1.5px solid var(--border-dim); border-radius: 40px; padding: 0.25rem 0.25rem 0.25rem 1.5rem; backdrop-filter: blur(12px); }
    .input-wrapper:focus-within { border-color: var(--accent); }
    .input-wrapper input { flex: 1; background: transparent; border: none; padding: 0.8rem 0; color: white; font-size: 1rem; outline: none; }
    .input-actions { display: flex; align-items: center; gap: 4px; margin-right: 6px; }
    .model-select-sm { background: transparent; border: 1px solid var(--border-dim); color: #c0b8a8; padding: 6px 10px; border-radius: 24px; font-size: 0.75rem; outline: none; backdrop-filter: blur(4px); }
    .model-select-sm option { background: #0e0e12; }
    .attach-btn { background: transparent; border: none; color: #a0a0a0; padding: 10px; cursor: pointer; border-radius: 50%; }
    .send-btn, .stop-btn { width: 46px; height: 46px; border-radius: 46px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: none; }
    .send-btn { background: var(--accent); color: #0b0b0f; box-shadow: 0 6px 14px #e6b80040; }
    .stop-btn { background: #c01030; color: white; box-shadow: 0 6px 14px #c0103080; }

    .search-results, .generated-image { margin-top: 1rem; border-top: 1px solid var(--border-dim); padding-top: 1rem; }
    .search-result-card { display: flex; align-items: flex-start; gap: 12px; padding: 12px; background: #1a1a22; border-radius: 14px; margin-bottom: 10px; border: 1px solid #2a2a30; }
    .favicon { width: 20px; height: 20px; border-radius: 4px; }
    .result-title { font-weight: 600; color: var(--accent); text-decoration: none; }
    .generated-image img { max-width: 100%; border-radius: 18px; margin-top: 12px; border: 1px solid var(--border-dim); display: block; }
    .download-link { display: inline-block; margin-top: 10px; color: var(--accent); }

    #image-input { display: none; }
    .limit-message { text-align: center; margin-top: 6px; color: var(--accent); font-size: 0.85rem; }
  </style>
</head>
<body>

<div class="mobile-menu-btn" id="menuToggle"><i class="fas fa-bars"></i></div>

<div class="sidebar" id="sidebar">
  <div class="logo-area">
    <svg class="star-svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
    <span class="logo-text">RedKnowledge</span>
  </div>
  <div class="new-chat-btn" id="new-chat-btn"><i class="fas fa-plus-circle"></i> New conversation</div>
  <div class="conversation-list" id="conversation-list"></div>
  <div class="sidebar-footer"><i class="fas fa-cloud"></i> Cloud Sync · 20/day</div>
</div>

<div class="main">
  <div class="chat-header">
    <h2>Assistant</h2>
    <span class="prompt-badge" id="prompt-counter">20 left</span>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-container">
    <div class="input-wrapper">
      <input type="text" id="user-input" placeholder="Ask RedKnowledge..." />
      <div class="input-actions">
        <select id="model-select" class="model-select-sm">
          <option value="openai/gpt-4o-mini">GPT-4o</option>
          <option value="anthropic/claude-sonnet-4.5">Claude</option>
          <option value="google/gemini-2.5-flash">Gemini</option>
        </select>
        <button class="attach-btn" id="attach-btn"><i class="fas fa-paperclip"></i></button>
        <input type="file" id="image-input" accept="image/*" />
      </div>
      <button class="send-btn" id="send-button"><i class="fas fa-arrow-up"></i></button>
    </div>
    <div id="limit-message" class="limit-message"></div>
  </div>
</div>

<script>
  (function(){
    "use strict";
    const OPENROUTER_KEY = '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';
    const POLLINATIONS_KEY = 'sk_Rd6a55zG1M2Wds96IT5599Hx302vtUYg';
    const BRAVE_KEY = 'BSAq6tL8uO4JXiBQyRqRjRQ3Qy3Qy3Q';
    const OPENROUTER_URL = 'https://openrouter.ai/api/v1/chat/completions';
    const LIMIT = 20;
    const STORAGE_KEY = 'redknowledge_mobile_fixed';

    let conversations = [], activeId = null, usage = { count:0, date:new Date().toDateString() };
    let imageBase64 = null;
    let currentAbortController = null;
    let isProcessing = false;

    const chatMessages = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-button');
    const newChatBtn = document.getElementById('new-chat-btn');
    const convList = document.getElementById('conversation-list');
    const promptSpan = document.getElementById('prompt-counter');
    const limitMsg = document.getElementById('limit-message');
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');

    menuToggle.addEventListener('click', (e) => { e.stopPropagation(); sidebar.classList.toggle('open'); });
    document.addEventListener('click', (e) => { 
      if(!sidebar.contains(e.target) && e.target !== menuToggle && !menuToggle.contains(e.target)) {
        sidebar.classList.remove('open');
      }
    });

    function loadData() {
      const s = localStorage.getItem(STORAGE_KEY);
      if(s){ try{ const d=JSON.parse(s); conversations=d.conversations||[]; usage=d.usage||{count:0,date:new Date().toDateString()}; activeId=d.activeId||null; }catch(e){} }
      if(usage.date!==new Date().toDateString()) usage={count:0,date:new Date().toDateString()};
      if(!conversations.length) {
        const welcomeMsg = { role:'assistant', content:'👋 Hello! I am **RedKnowledge**. I can search the web, generate images, and more.' };
        const newConv = { id:Date.now()+'', title:'Welcome', messages:[welcomeMsg] };
        conversations = [newConv]; activeId = newConv.id;
      } else if(!activeId||!conversations.find(c=>c.id===activeId)) activeId = conversations[0].id;
      saveData(); renderConvs(); renderMsgs(); updateLimit();
    }
    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify({conversations, usage, activeId})); }
    function getRemaining() { if(usage.date!==new Date().toDateString()){ usage={count:0,date:new Date().toDateString()}; saveData(); } return Math.max(0, LIMIT-usage.count); }
    function usePrompt() { if(getRemaining()<=0) return false; usage.count++; saveData(); updateLimit(); return true; }
    function updateLimit() { const r=getRemaining(); promptSpan.textContent=`${r} left`; const lim=r===0; if(!isProcessing) userInput.disabled = lim; limitMsg.textContent=lim?'Daily limit reached.':''; }

    function renderConvs() {
      convList.innerHTML='';
      conversations.forEach(c=>{
        const d=document.createElement('div'); d.className=`conv-item ${c.id===activeId?'active':''}`;
        d.innerHTML=`<span style="flex:1;">${c.title||'Untitled'}</span><i class="fas fa-trash-alt"></i>`;
        d.addEventListener('click', e=>{ if(e.target.tagName==='I') return; activeId=c.id; renderConvs(); renderMsgs(); saveData(); });
        d.querySelector('i').addEventListener('click', e=>{ e.stopPropagation(); if(conversations.length<=1) return; conversations=conversations.filter(x=>x.id!==c.id); if(activeId===c.id) activeId=conversations[0].id; renderConvs(); renderMsgs(); saveData(); });
        convList.appendChild(d);
      });
    }
    function getActive() { return conversations.find(c=>c.id===activeId); }
    function addMessage(role, content, extra={}) {
      const c=getActive(); if(!c) return;
      c.messages.push({ role, content, ...extra });
      saveData(); renderMsgs(); renderConvs();
      if(c.messages.length >= 2 && c.title === 'New chat' && role === 'assistant') generateTitle(c);
    }
    async function generateTitle(conv) {
      try {
        const resp = await fetch(OPENROUTER_URL, { method:'POST', headers:{ Authorization:`Bearer ${OPENROUTER_KEY}`, 'Content-Type':'application/json' }, body:JSON.stringify({ model:'openai/gpt-4o-mini', messages:[{ role:'user', content:`Short title: ${conv.messages[1]?.content}` }], max_tokens:20 }) });
        if(resp.ok) { const d=await resp.json(); conv.title=d.choices[0].message.content.trim().slice(0,30); saveData(); renderConvs(); }
      } catch(e) {}
    }
    function renderMsgs() {
      const c=getActive(); chatMessages.innerHTML=''; if(!c) return;
      c.messages.forEach(m=>{
        const isUser=m.role==='user';
        const div=document.createElement('div'); div.className=`message ${isUser?'user':''}`;
        div.innerHTML = `<div class="message-avatar">${isUser?'<i class="fas fa-user"></i>':'<i class="fas fa-robot"></i>'}</div>`;
        const w=document.createElement('div'); w.className='message-content-wrapper';
        if(m.searchResults) {
          const rDiv=document.createElement('div'); rDiv.className='search-results';
          m.searchResults.forEach(r=>{
            rDiv.innerHTML += `<div class="search-result-card"><img class="favicon" src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(r.url)}"><div><a class="result-title" href="${r.url}" target="_blank">${r.title}</a><div style="font-size:0.7rem;color:#888;">${r.url}</div><div>${r.snippet}</div></div></div>`;
          });
          w.appendChild(rDiv);
        }
        if(m.generatedImage) {
          const imgDiv=document.createElement('div'); imgDiv.className='generated-image';
          imgDiv.innerHTML = `<img src="${m.generatedImage.url}" alt="Generated"><br><a class="download-link" href="${m.generatedImage.url}" download>⬇ Download Image</a>`;
          w.appendChild(imgDiv);
        }
        const content=document.createElement('div'); content.className='message-content';
        content.innerHTML = isUser ? m.content : marked.parse(m.content);
        w.appendChild(content); div.appendChild(w); chatMessages.appendChild(div);
      });
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function performWebSearch(query, signal) {
      try {
        const res = await fetch(`https://api.search.brave.com/res/v1/web/search?q=${encodeURIComponent(query)}&count=5`, {
          headers: { 'Accept': 'application/json', 'X-Subscription-Token': BRAVE_KEY }, signal
        });
        if(res.ok) {
          const data = await res.json();
          return data.web?.results?.map(r => ({ title: r.title, url: r.url, snippet: r.description })) || [];
        }
      } catch(e) {}
      return [{ title: `${query} - Wikipedia`, url: `https://en.wikipedia.org/wiki/${encodeURIComponent(query)}`, snippet: 'Encyclopedia article.' }];
    }

    async function generateImage(prompt, signal) {
      try {
        const resp = await fetch('https://api.pollinations.ai/v1/images/generations', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${POLLINATIONS_KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, model: 'flux', width: 1024, height: 1024 }),
          signal
        });
        if(resp.ok) {
          const data = await resp.json();
          return { url: data.data[0].url };
        }
      } catch(e) {}
      return { url: `https://via.placeholder.com/1024x1024/1a1a22/e6b800?text=${encodeURIComponent(prompt.slice(0,30))}` };
    }

    const TOOLS = [
      { type:'function', function:{ name:'web_search', description:'Search the web', parameters:{ type:'object', properties:{ query:{ type:'string' } }, required:['query'] } } },
      { type:'function', function:{ name:'generate_image', description:'Generate an image', parameters:{ type:'object', properties:{ prompt:{ type:'string' } }, required:['prompt'] } } }
    ];

    async function streamChat(messages, signal) {
      const model = document.getElementById('model-select').value;
      const sys = `You are RedKnowledge, a smart assistant. Use web_search for real-time info and generate_image for images. Today is ${new Date().toLocaleString()}.`;
      const payload = { model, messages: [{ role:'system', content:sys }, ...messages.map(m=>({ role:m.role, content:m.content }))], stream: true, temperature:0.7, max_tokens:800, tools: TOOLS };
      if(imageBase64) {
        payload.messages = payload.messages.map(m=> m.role==='user' && m.content===messages[messages.length-1].content ? { role:'user', content:[{ type:'text', text:m.content }, { type:'image_url', image_url:{ url:imageBase64 } }] } : m );
      }
      const res = await fetch(OPENROUTER_URL, { method:'POST', headers:{ Authorization:`Bearer ${OPENROUTER_KEY}`, 'Content-Type':'application/json' }, body:JSON.stringify(payload), signal });
      if(!res.ok) throw new Error((await res.json()).error?.message||'API error');
      const reader = res.body.getReader(), decoder = new TextDecoder();
      let content='', toolCalls=[];
      while(true) {
        const {done, value} = await reader.read(); if(done) break;
        const lines = decoder.decode(value, {stream:true}).split('\n');
        for(const line of lines) {
          if(!line.startsWith('data: ')) continue;
          const data = line.slice(6); if(data==='[DONE]') continue;
          try { const json=JSON.parse(data); const delta=json.choices?.[0]?.delta; if(delta?.content) content+=delta.content; if(delta?.tool_calls) { 
            delta.tool_calls.forEach((tc, idx) => {
              if(!toolCalls[idx]) toolCalls[idx] = { id: tc.id, function: { name: tc.function?.name || '', arguments: '' } };
              if(tc.function?.name) toolCalls[idx].function.name = tc.function.name;
              if(tc.function?.arguments) toolCalls[idx].function.arguments += tc.function.arguments;
            });
          }} catch(e) {}
        }
      }
      return { content, toolCalls };
    }

    function setProcessingState(processing) {
      isProcessing = processing;
      userInput.disabled = processing || getRemaining() === 0;
      
      const btnContainer = sendBtn.parentNode;
      if(processing) {
        sendBtn.style.display = 'none';
        if(!document.getElementById('stop-button')) {
          const stopBtn = document.createElement('button');
          stopBtn.id = 'stop-button';
          stopBtn.className = 'stop-btn';
          stopBtn.innerHTML = '<i class="fas fa-stop"></i>';
          stopBtn.addEventListener('click', abortRequest);
          btnContainer.appendChild(stopBtn);
        }
      } else {
        sendBtn.style.display = 'flex';
        const stopBtn = document.getElementById('stop-button');
        if(stopBtn) stopBtn.remove();
        currentAbortController = null;
      }
    }

    function abortRequest() {
      if(currentAbortController) {
        currentAbortController.abort();
        currentAbortController = null;
      }
    }

    async function handleSend() {
      const prompt = userInput.value.trim(); if(!prompt && !imageBase64) return;
      if(!usePrompt()) return;
      const userMsg = prompt || (imageBase64 ? 'Describe this image' : '');
      addMessage('user', userMsg); userInput.value='';
      
      currentAbortController = new AbortController();
      setProcessingState(true);
      
      const isImage = /generate|create|draw|paint|picture|image|art|bild|imagen/i.test(prompt);
      const statusDiv = document.createElement('div'); statusDiv.className='message'; statusDiv.id='typing';
      if(isImage) {
        statusDiv.innerHTML = `<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="status-badge"><i class="fas fa-paint-brush"></i> Generating image…</div>`;
      } else {
        statusDiv.innerHTML = `<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
      }
      chatMessages.appendChild(statusDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      
      try {
        const result = await streamChat(getActive().messages, currentAbortController.signal);
        document.getElementById('typing')?.remove();
        let final = result.content, searchResults = null, generatedImage = null;
        if(result.toolCalls?.length) {
          for(const tc of result.toolCalls) {
            if(tc.function.name==='web_search') {
              let args={}; try { args=JSON.parse(tc.function.arguments); } catch { args={ query: prompt }; }
              searchResults = await performWebSearch(args.query || prompt, currentAbortController.signal);
              final = final || `Here's what I found:`; final += `\n\n` + searchResults.map((r,i)=>`[${i+1}] ${r.title}`).join('\n');
            } else if(tc.function.name==='generate_image') {
              let args={}; try { args=JSON.parse(tc.function.arguments); } catch { args={ prompt }; }
              generatedImage = await generateImage(args.prompt || prompt, currentAbortController.signal);
              final = final || `Here's your image!`;
            }
          }
        }
        addMessage('assistant', final || 'Done.', { searchResults, generatedImage });
      } catch(e) {
        document.getElementById('typing')?.remove();
        if(e.name === 'AbortError') addMessage('assistant', '⏹️ Request cancelled.');
        else addMessage('assistant', `Error: ${e.message}`);
      } finally {
        imageBase64 = null;
        setProcessingState(false);
        updateLimit();
        userInput.focus();
      }
    }

    document.getElementById('attach-btn').addEventListener('click', ()=>document.getElementById('image-input').click());
    document.getElementById('image-input').addEventListener('change', e=>{ 
      const f=e.target.files[0]; if(!f) return; 
      const r=new FileReader(); r.onload=ev=>{ imageBase64=ev.target.result; userInput.placeholder='Image attached...'; }; 
      r.readAsDataURL(f); 
    });
    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', e=>{ if(e.key==='Enter' && !isProcessing){ e.preventDefault(); handleSend(); } });
    newChatBtn.addEventListener('click', ()=>{
      const c={ id:Date.now()+'', title:'New chat', messages:[{ role:'assistant', content:'👋 Hello! How can I help?' }] };
      conversations.push(c); activeId=c.id; renderConvs(); renderMsgs(); saveData();
    });

    marked.setOptions({ breaks:true, gfm:true });
    loadData();
    userInput.focus();
  })();
</script>
</body>
</html>
